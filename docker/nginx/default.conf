upstream web {
    server web:8000;
}

server {
    listen 80;
    listen [::]:80;

    server_name 4300193-op40148.twc1.net;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://4300193-op40148.twc1.net$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name 4300193-op40148.twc1.net;

    ssl_certificate /etc/nginx/ssl/live/4300193-op40148.twc1.net/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/4300193-op40148.twc1.net/privkey.pem;

    location /api {
    	proxy_pass http://web;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Host $server_name;
      proxy_set_header X-Forwarded-Protocol $scheme;
      proxy_redirect off;
    }
}